[build]
  command   = "npm run build"
  publish   = "dist"

# ── Netlify Functions config ───────────────────────────────────────────────────
[functions]
  # Use esbuild so TypeScript is compiled + all imports (including api/[...path].ts) are bundled
  node_bundler = "esbuild"
  # Bundle @vercel/node as a dev dep — its types are erased; the runtime never loads it
  external_node_modules = []

[functions."api"]
  # Increase timeout to 60 seconds for long-running operations like MCQ generation
  timeout = 60

[functions."inngest"]
  # Increase timeout to 5 minutes (300 seconds) for long-running AI workers
  timeout = 300

# ── Route /api/inngest → Inngest Netlify Function ─────────────────────────────
# Must come BEFORE the /api/* catch-all so Inngest serve endpoint is reachable
[[redirects]]
  from   = "/api/inngest"
  to     = "/.netlify/functions/inngest"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/inngest/*"
  to     = "/.netlify/functions/inngest/:splat"
  status = 200
  force  = true

# ── Route /api/* → Netlify Function ───────────────────────────────────────────
# The function receives event.path = "/api/..." so it can reconstruct the route
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── SPA fallback (React Router) ────────────────────────────────────────────────
# Must come after the /api rule
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

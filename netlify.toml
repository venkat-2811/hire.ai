[build]
  command   = "npm run build"
  publish   = "dist"

# ── Netlify Functions config ───────────────────────────────────────────────────
[functions]
  # Use esbuild so TypeScript is compiled + all imports (including api/[...path].ts) are bundled
  node_bundler = "esbuild"
  # Bundle @vercel/node as a dev dep — its types are erased; the runtime never loads it
  external_node_modules = []
  # Increase timeout to 60 seconds for long-running operations like MCQ generation
  timeout = 60

# ── Route /api/* → Netlify Function ───────────────────────────────────────────
# The function receives event.path = "/api/..." so it can reconstruct the route
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── SPA fallback (React Router) ────────────────────────────────────────────────
# Must come after the /api rule
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
